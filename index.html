<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Simples</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="sidebar">
<h2>Dashboard</h2>

<ul>
<li class="active">🏠 Início</li>
<li>📊 Relatórios</li>
<li>👥 Usuários</li>
<li>⚙ Configurações</li>
</ul>

</div>

<div class="main">

<header>

<h1>Bem-vindo!</h1>

<input type="text" placeholder="Pesquisar...">

</header>

<div class="cards">

<div class="card">
<h3>Usuários</h3>
<h2>1250</h2>
</div>

<div class="card">
<h3>Vendas</h3>
<h2>R$18.500</h2>
</div>

<div class="card">
<h3>Pedidos</h3>
<h2>320</h2>
</div>

<div class="card">
<h3>Lucro</h3>
<h2>R$8.420</h2>
</div>

</div>

<div class="grafico">

<canvas id="grafico"></canvas>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
